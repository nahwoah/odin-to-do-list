<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>
<body>
    <h1>To Do List</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>completed</th>
                <!-- <th>Completed</th> -->
                
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    

    <dialog id="new-item">
        <label for="add-title">Title</label><br>
        <input type="text" name="add-title" id="add-title"><br>
        <label for="add-description">Description</label><br>
        <textarea name="add-description" id="add-description" rows="3"  maxlength="500"></textarea><br>
        <label for="add-notes">Notes</label><br>
        <textarea name="add-notes" id="add-notes"  maxlength="200"></textarea><br>
        <input type="checkbox" id="add-completed" name="add-completed">
        <!-- <label for="add-completed"> Completed</label><br> -->
        <button id="submitBtn" value="default">Submit</button>
        <button commandfor="new-item" command="close">Close</button>
    </dialog>
    <button command="show-modal" commandfor="new-item">New Item</button>
</body>
</html>
