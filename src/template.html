<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>
<body>
    <h1>To Do List</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Pages</th>
                <th>Read</th>
                
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    

    <dialog id="new-item">
        <label for="add-title">Title</label><br>
        <input type="text" name="add-title" id="add-title" size="34"><br>
        <label for="add-description">Description</label><br>
        <textarea name="add-description" id="add-description" rows="3" cols="33" maxlength="500"></textarea><br>
        <label for="add-notes">Notes</label><br>
        <textarea name="add-notes" id="add-notes" cols="33" maxlength="200"></textarea><br>
        <input type="checkbox" id="add-read" name="add-read">
        <label for="add-read"> Read</label><br>
        <button id="submitBtn" value="default">Submit</button>
        <button commandfor="new-item" command="close">Close</button>
    </dialog>
    <button command="show-modal" commandfor="new-item">New Item</button>
</body>
</html>
